<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母卡片 · 俄语拼读互助站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/site.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="site-header"></div>

    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 flex items-center gap-2">
                    <span class="w-2.5 h-5 bg-indigo-600 rounded-full"></span>筛选与搜索
                </h2>
                <div class="relative mb-4">
                    <input type="text" id="search-box" oninput="filterAlphabet()" placeholder="搜索字母或单词..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                    <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <div class="flex flex-wrap gap-2 mb-4">
                    <button type="button" onclick="setFilter('all')" id="filter-all" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white">全部 (33)</button>
                    <button type="button" onclick="setFilter('vowel')" id="filter-vowel" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-50 border">元音 (10)</button>
                    <button type="button" onclick="setFilter('consonant')" id="filter-consonant" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-50 border">辅音 (21)</button>
                    <button type="button" onclick="setFilter('sign')" id="filter-sign" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-50 border">符号 (2)</button>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-semibold text-slate-500 mb-1">
                        <span>学习进度</span><span id="progress-text" class="text-indigo-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width:0%"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">点击卡片星星标记「已掌握」</p>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">字母拼读卡片 (33)</h2>
                    <span class="text-xs text-slate-500">显示 <span id="displayed-count" class="font-bold text-indigo-600">33</span> 个</span>
                </div>
                <div id="alphabet-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 pointer-events-none"></div>
    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/alphabet.js"></script>
    <script>window.onload = function() { initSite('alphabet'); initAlphabetPage(); };</script>
</body>
</html>
