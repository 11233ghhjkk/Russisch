<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼读法则 · 俄语拼读互助站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/site.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="site-header"></div>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h2 class="text-lg font-bold border-b pb-3 flex items-center gap-2">
                <span class="w-2.5 h-5 bg-indigo-600 rounded-full"></span>新手必备：俄语核心拼读法则
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6 text-sm text-slate-600">
                <div class="p-4 bg-slate-50 rounded-xl">
                    <h3 class="font-bold text-indigo-700 text-sm">1. 清浊交替 (Оглушение)</h3>
                    <p class="text-xs leading-relaxed mt-2">浊辅音（Б, В, Г, Д, Ж, З）在词尾或清辅音前变清音。如 <strong>Кровь</strong> 读作「克罗夫」；<strong>Мозг</strong> 读作「莫斯克」。</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-xl">
                    <h3 class="font-bold text-teal-700 text-sm">2. 元音弱化 (Редукция)</h3>
                    <p class="text-xs leading-relaxed mt-2">非重读 <strong>О</strong> 常读 [а]。如 <strong>Вода</strong> →「瓦达」；<strong>Организм</strong> 首音节 O 弱化为 A。</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-xl">
                    <h3 class="font-bold text-amber-700 text-sm">3. 软音符号 (Ь)</h3>
                    <p class="text-xs leading-relaxed mt-2"><strong>Ь</strong> 不发音，但使前辅音软化。如 <strong>Боль</strong>（疼痛）中 L 音变软。</p>
                </div>
            </div>
            <p class="text-xs text-slate-400 mt-6 text-center">
                <a href="alphabet.html" class="text-indigo-600 hover:underline">前往字母卡片练习 →</a>
            </p>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="js/app.js"></script>
    <script>window.onload = function() { initSite('rules'); };</script>
</body>
</html>
