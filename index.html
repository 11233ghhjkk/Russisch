<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 · 俄语拼读互助站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/site.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="site-header"></div>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl mb-8 text-sm text-blue-700">
            <p class="font-medium">发音提示</p>
            <p class="text-xs text-blue-600 mt-1">点击各板块中的俄语文字即可朗读。请使用 Chrome / Edge / Safari，并安装俄语语音包。</p>
        </div>

        <h2 class="text-2xl font-bold text-slate-800 mb-2">欢迎学习俄语拼读</h2>
        <p class="text-slate-500 text-sm mb-8">请从下方选择学习板块，每个板块为独立页面。</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <a href="alphabet.html" class="block p-6 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-200 transition-all group">
                <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">核心</span>
                <h3 class="text-lg font-bold mt-2 group-hover:text-indigo-700">字母拼读卡片</h3>
                <p class="text-xs text-slate-500 mt-2">33 个字母 · 生活词 + 医学词 · 学习进度</p>
            </a>
            <a href="sandbox.html" class="block p-6 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:border-teal-200 transition-all group">
                <span class="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded-full">练习</span>
                <h3 class="text-lg font-bold mt-2 group-hover:text-teal-700">拼读实验沙盒</h3>
                <p class="text-xs text-slate-500 mt-2">虚拟俄语键盘 · 自由拼写并朗读</p>
            </a>
            <a href="dental.html" class="block p-6 bg-white rounded-2xl border border-violet-100 shadow-sm hover:shadow-md hover:border-violet-300 transition-all group">
                <span class="text-[10px] font-bold text-violet-600 bg-violet-50 px-2 py-0.5 rounded-full">诊所</span>
                <h3 class="text-lg font-bold mt-2 group-hover:text-violet-700">口腔诊所词汇</h3>
                <p class="text-xs text-slate-500 mt-2">39 个高频词 · 翻转例句 · 分步发音</p>
            </a>
            <a href="game.html" class="block p-6 bg-gradient-to-br from-indigo-900 to-slate-900 rounded-2xl shadow-lg hover:scale-[1.02] transition-transform text-white">
                <span class="text-[10px] font-bold text-teal-300 bg-white/10 px-2 py-0.5 rounded-full">游戏</span>
                <h3 class="text-lg font-bold mt-2">医学词汇配对</h3>
                <p class="text-xs text-slate-300 mt-2">俄文 ↔ 中文连连看自测</p>
            </a>
            <a href="rules.html" class="block p-6 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all group">
                <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">必读</span>
                <h3 class="text-lg font-bold mt-2 group-hover:text-amber-700">拼读核心法则</h3>
                <p class="text-xs text-slate-500 mt-2">清浊交替 · 元音弱化 · 软音符号</p>
            </a>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>
    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>window.onload = function() { initSite('index'); };</script>
</body>
</html>
