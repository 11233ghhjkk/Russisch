<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口腔词汇 · 俄语拼读互助站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/site.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="site-header"></div>

    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-sm border border-violet-100 p-6 sm:p-8">
            <span class="bg-violet-100 text-violet-700 text-[10px] font-bold px-2.5 py-1 rounded-full">口腔诊所专区</span>
            <h2 class="text-xl font-bold mt-2">口腔诊所常见词汇</h2>
            <p class="text-sm text-slate-500 mt-1">1 朗读单词 → 2 翻转 → 3 朗读例句 → 4 翻回</p>

            <div class="mt-4 relative max-w-md">
                <input type="text" id="dental-search-box" placeholder="搜索词汇、例句..." class="w-full pl-10 pr-4 py-2 border rounded-xl text-sm focus:ring-2 focus:ring-violet-500">
                <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <p class="text-xs text-slate-400 mt-2">共 <span id="dental-displayed-count" class="font-bold text-violet-600">0</span> 个词条</p>

            <div id="dental-vocab-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-6"></div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 pointer-events-none"></div>
    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dental.js"></script>
    <script>window.onload = function() { initSite('dental'); initDentalPage(); };</script>
</body>
</html>
